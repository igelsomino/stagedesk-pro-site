<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111314" />
    <title>StageDesk Share</title>
    <link rel="icon" href="../assets/stagedesk-pro-icon.png" />
    <link rel="stylesheet" href="/share-assets/share.css?v=20260721-57" />
  </head>
  <body>
    <main id="share-app" class="share-shell">
      <div class="share-loading" role="status">Caricamento condivisione...</div>
    </main>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/share/service-worker.js', { scope: '/share/' }).catch(() => {}))
      }
    </script>
    <script data-cfasync="false" type="module" src="/share-assets/share.js?v=20260721-57"></script>
  </body>
</html>
